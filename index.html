<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TBHコズミック合成シミュレーター</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #10131a;
      --panel: #171d27;
      --panel-2: #111722;
      --line: #2d3748;
      --text: #e8eef7;
      --muted: #9aa7ba;
      --blue: #4f8cff;
      --red: #ef5a73;
      --green: #54d88d;
      --yellow: #f4c95d;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Hiragino Sans", "Yu Gothic UI", Meiryo, sans-serif;
      background:
        radial-gradient(circle at 15% 0%, rgba(79, 140, 255, 0.16), transparent 30%),
        radial-gradient(circle at 85% 0%, rgba(239, 90, 115, 0.13), transparent 32%),
        var(--bg);
      color: var(--text);
    }

    main {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 28px 0 44px;
    }

    header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(24px, 3vw, 34px);
      line-height: 1.15;
      letter-spacing: 0;
    }

    .lead {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 760px;
    }

    .actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button {
      min-height: 44px;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 8px;
      padding: 0 18px;
      background: var(--blue);
      color: white;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }
    button:active { transform: translateY(1px); }
    button.secondary { background: #2a3446; }
    button.danger { background: #7a2030; border-color: var(--red); }
    button.danger:hover { background: #9c2a3e; }

    button:disabled,
    button:disabled:hover {
      opacity: 0.55;
      cursor: not-allowed;
      filter: none;
      transform: none;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 16px;
      align-items: start;
    }

    .grid > .panel:first-child {
      grid-column: 1 / -1;
      display: grid;
      grid-template-columns: minmax(0, 1.08fr) minmax(360px, 0.92fr);
      gap: 16px;
      align-items: start;
    }

    .left-col,
    .right-col {
      display: grid;
      gap: 14px;
      align-content: start;
      min-width: 0;
    }

    .left-col h2,
    .right-col h2 {
      margin-bottom: 0;
    }

    .grid > .panel:nth-child(2) {
      grid-column: 1 / -1;
    }

    section {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(23, 29, 39, 0.9);
      overflow: hidden;
    }

    .panel { padding: 18px; }

    .hero {
      display: grid;
      gap: 10px;
      padding: 20px;
      background: var(--panel-2);
      border: 1px solid var(--line);
      border-radius: 8px;
      font-variant-numeric: tabular-nums;
    }

    .label {
      color: var(--muted);
      font-size: 13px;
    }

    .value {
      color: var(--red);
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
      overflow-wrap: anywhere;
    }

    .next {
      display: grid;
      gap: 8px;
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141b25;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .next strong {
      font-size: 20px;
      line-height: 1.35;
    }

    /* 成功エフェクト：緑グロー＋軽いスケール */
    @keyframes next-success {
      0%   { transform: scale(1);    border-color: var(--line);  box-shadow: none; }
      15%  { transform: scale(1.03); border-color: var(--green); box-shadow: 0 0 0 3px rgba(84,216,141,0.35), 0 0 22px rgba(84,216,141,0.25); }
      60%  { transform: scale(1.01); border-color: var(--green); box-shadow: 0 0 0 2px rgba(84,216,141,0.2),  0 0 14px rgba(84,216,141,0.15); }
      100% { transform: scale(1);    border-color: var(--line);  box-shadow: none; }
    }

    /* 失敗エフェクト：赤グロー＋横シェイク */
    @keyframes next-fail {
      0%   { transform: translateX(0);    border-color: var(--line); box-shadow: none; }
      10%  { transform: translateX(-7px); border-color: var(--red);  box-shadow: 0 0 0 3px rgba(239,90,115,0.4), 0 0 20px rgba(239,90,115,0.3); }
      25%  { transform: translateX( 6px); border-color: var(--red);  box-shadow: 0 0 0 3px rgba(239,90,115,0.4), 0 0 20px rgba(239,90,115,0.3); }
      40%  { transform: translateX(-4px); border-color: var(--red);  box-shadow: 0 0 0 2px rgba(239,90,115,0.25); }
      55%  { transform: translateX( 3px); border-color: var(--red);  box-shadow: 0 0 0 2px rgba(239,90,115,0.25); }
      70%  { transform: translateX(-2px); border-color: var(--red);  box-shadow: 0 0 0 1px rgba(239,90,115,0.15); }
      100% { transform: translateX(0);    border-color: var(--line); box-shadow: none; }
    }

    .next.anim-success {
      animation: next-success 0.9s cubic-bezier(.2,.8,.3,1) forwards;
    }

    .next.anim-fail {
      animation: next-fail 0.7s ease-out forwards;
    }

    .message {
      min-height: 28px;
      color: var(--muted);
      line-height: 1.6;
    }

    .message.fail { color: var(--red); font-weight: 800; }
    .message.success { color: var(--green); font-weight: 800; }
    .message.warn { color: var(--yellow); font-weight: 800; }

    /* 進捗バー */
    .progress-wrap {
      display: none;
      gap: 8px;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141b25;
    }
    .progress-wrap.active { display: grid; }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--muted);
    }

    .progress-label span:last-child {
      color: var(--text);
      font-weight: 700;
    }

    .progress-bar-outer {
      height: 8px;
      border-radius: 4px;
      background: #0c111a;
      overflow: hidden;
    }

    .progress-bar-inner {
      height: 100%;
      border-radius: 4px;
      background: var(--blue);
      transition: width 0.12s ease;
      width: 0%;
    }

    .progress-synths {
      font-size: 12px;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 18px;
      letter-spacing: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      text-align: right;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      background: #141b25;
    }

    th:first-child, td:first-child { text-align: left; }
    tr:last-child td { border-bottom: 0; }

    .inventory td:nth-child(2) {
      font-size: 18px;
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      width: 1%;          /* 内容幅に収縮させつつ white-space:nowrap で広がらせる */
      white-space: nowrap;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .counts-panel {
      margin-top: 16px;
    }

    .card {
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141b25;
      padding: 13px;
    }

    .card strong {
      display: block;
      margin-top: 5px;
      font-size: 20px;
      overflow-wrap: anywhere;
      font-variant-numeric: tabular-nums;
      min-height: 1.3em; /* 数値が消えても高さが潰れない */
    }

    .log {
      display: grid;
      gap: 8px;
      max-height: 330px;
      overflow: auto;
      padding-right: 4px;
    }

    .log-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141b25;
      padding: 10px;
      line-height: 1.55;
    }

    .log-item b { color: var(--yellow); }
    .log-item.fail b { color: var(--red); }
    .log-item.success b { color: var(--green); }
    .log-item.warn b { color: var(--yellow); }

    .rules { margin-top: 16px; }

    .r-common { color: #c9ced7; }
    .r-uncommon { color: #58d783; }
    .r-rare { color: #68a9ff; }
    .r-legendary { color: #f5c451; }
    .r-immortal { color: #ff7084; }
    .r-arcana { color: #bd8bff; }
    .r-beyond { color: #f28bc4; }
    .r-celestial { color: #51d2d0; }
    .r-divine { color: #f4f7ff; }
    .r-cosmic { color: #ff9f43; }

    .prob-list {
      display: grid;
      gap: 10px;
    }

    .current-prob-wrap {
      display: grid;
      gap: 8px;
    }

    .prob-row {
      display: grid;
      gap: 8px;
      padding: 11px 13px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #141b25;
    }

    .prob-row-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }

    .prob-row-head .name {
      font-weight: 800;
      font-size: 14px;
    }

    .prob-row-head .sub {
      font-size: 11px;
      color: var(--muted);
    }

    .prob-bar {
      display: flex;
      height: 10px;
      border-radius: 5px;
      overflow: hidden;
      background: #0c111a;
    }

    .prob-seg + .prob-seg { border-left: 1px solid rgba(8, 10, 16, 0.55); }

    .prob-seg.fail {
      opacity: 0.4;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.3) 0 3px, transparent 3px 6px);
    }

    .prob-legend {
      display: flex;
      flex-wrap: wrap;
      gap: 5px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .prob-legend .dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 5px;
      vertical-align: middle;
    }

    .prob-legend .dot.fail {
      opacity: 0.55;
      background-image: repeating-linear-gradient(135deg, rgba(255,255,255,0.35) 0 2px, transparent 2px 4px);
    }

    .prob-legend .pct {
      color: var(--text);
      font-weight: 700;
      margin-left: 2px;
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      background: rgba(8, 10, 16, 0.72);
      backdrop-filter: blur(2px);
      animation: overlay-fade 0.18s ease-out;
    }

    .modal-overlay[hidden] { display: none; }

    .modal-box {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel);
      padding: 26px 22px 22px;
      text-align: center;
      box-shadow: 0 18px 50px rgba(0, 0, 0, 0.5);
      animation: modal-pop 0.22s cubic-bezier(.2, .8, .3, 1.2);
    }

    .modal-box.cosmic {
      border-color: var(--r-cosmic, #ff9f43);
      box-shadow: 0 0 0 1px rgba(255, 159, 67, 0.5), 0 18px 50px rgba(0, 0, 0, 0.5);
    }

    .modal-icon {
      font-size: 34px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .modal-box h3 {
      margin: 0 0 10px;
      font-size: 21px;
      color: var(--yellow);
    }

    .modal-box.cosmic h3 { color: var(--r-cosmic, #ff9f43); }

    .modal-box p {
      margin: 0 0 20px;
      color: var(--muted);
      line-height: 1.7;
      font-size: 14px;
    }

    .modal-box button {
      width: 100%;
      background: var(--green);
    }

    .modal-box button:disabled {
      background: #2a3446;
      color: var(--muted);
      cursor: not-allowed;
    }

    .modal-hint {
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
    }

    @keyframes overlay-fade {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modal-pop {
      from { opacity: 0; transform: scale(0.9) translateY(8px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @media (max-width: 840px) {
      header {
        flex-direction: column;
        align-items: stretch;
      }

      .actions { justify-content: stretch; }
      button { flex: 1 1 180px; }
      .grid,
      .grid > .panel:first-child {
        grid-template-columns: 1fr;
      }

      .cards { grid-template-columns: 1fr; }
      th, td { white-space: normal; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div>
        <h1>TBHコズミック合成シミュレーター</h1>
        <p class="lead">賽の河原へようこそ。『合成開始！』ボタンを押すと目標達成まで処理が進行します。</p>
      </div>
      <div class="actions">
        <button id="stepBtn" type="button">合成開始！</button>
        <button id="cancelBtn" type="button" class="danger" style="display:none;">キャンセル</button>
        <button id="resetBtn" type="button" class="secondary">リセット</button>
      </div>
    </header>

    <div class="grid">
      <section class="panel">
        <div class="left-col">
          <div class="hero">
            <span class="label">消費したコモン総数</span>
            <span id="totalCommons" class="value">0 個</span>
            <span id="totalCommonsSub" class="label">コモン合成 0 回分</span>
          </div>

          <div class="next">
            <span class="label">次の目標</span>
            <strong id="nextAction">アンコモンを9個揃える</strong>
            <div id="message" class="message">ボタンを押すと、目標在庫まで合成します。</div>
          </div>

          <!-- 進捗バー（バッチ処理中のみ表示） -->
          <div id="progressWrap" class="progress-wrap">
            <div class="progress-label">
              <span id="progressTarget">処理中…</span>
              <span id="progressPct">0%</span>
            </div>
            <div class="progress-bar-outer">
              <div id="progressBar" class="progress-bar-inner"></div>
            </div>
            <div id="progressSynths" class="progress-synths">合成 0 回 / コモン消費 0 個</div>
          </div>

          <div class="current-prob-wrap">
            <span class="label">現在合成中の確率</span>
            <div id="currentProb"></div>
          </div>
        </div>

        <div class="right-col">
          <div>
            <h2>現在の在庫数</h2>
            <div id="inventory"></div>
          </div>

          <div class="cards">
            <div class="card">
              <span class="label">合成総回数</span>
              <strong id="totalSynths">0 回</strong>
            </div>
            <div class="card">
              <span class="label">失敗回数</span>
              <strong id="failCount">0 回</strong>
            </div>
            <div class="card">
              <span class="label">現在の段階</span>
              <strong id="stageName">アンコモン</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="panel">
        <h2>各レアリティの合成回数</h2>
        <div id="counts"></div>
      </section>
    </div>

    <section class="panel rules">
      <h2>ログ</h2>
      <div id="log" class="log"></div>
    </section>

    <section class="panel rules">
      <h2>合成確率</h2>
      <div id="rules"></div>
    </section>
  </main>

  <div id="modalOverlay" class="modal-overlay" hidden>
    <div id="modalBox" class="modal-box" role="alertdialog" aria-modal="true" aria-labelledby="modalTitle" aria-describedby="modalBody">
      <div class="modal-icon" id="modalIcon">✨</div>
      <h3 id="modalTitle"></h3>
      <p id="modalBody"></p>
      <button id="modalCloseBtn" type="button" disabled>確認して次へ進む</button>
      <div class="modal-hint" id="modalHint">結果を見逃さないように、少しだけお待ちください…</div>
    </div>
  </div>

  <script>
    const rarities = [
      { key: "common",    name: "コモン",         cls: "r-common",    color: "#c9ced7" },
      { key: "uncommon",  name: "アンコモン",      cls: "r-uncommon",  color: "#58d783" },
      { key: "rare",      name: "レア",            cls: "r-rare",      color: "#68a9ff" },
      { key: "legendary", name: "レジェンダリー",  cls: "r-legendary", color: "#f5c451" },
      { key: "immortal",  name: "イモータル",      cls: "r-immortal",  color: "#ff7084" },
      { key: "arcana",    name: "アルカナ",        cls: "r-arcana",    color: "#bd8bff" },
      { key: "beyond",    name: "ビヨンド",        cls: "r-beyond",    color: "#f28bc4" },
      { key: "celestial", name: "セレスティアル",  cls: "r-celestial", color: "#51d2d0" },
      { key: "divine",    name: "ディヴァイン",    cls: "r-divine",    color: "#f4f7ff" },
      { key: "cosmic",    name: "コズミック",      cls: "r-cosmic",    color: "#ff9f43" }
    ];

    const rules = [
      { from: "common",    outcomes: [{ to: "uncommon",  p: 0.952 }, { to: "rare",      p: 0.048 }] },
      { from: "uncommon",  outcomes: [{ to: "rare",      p: 0.962 }, { to: "legendary", p: 0.038 }] },
      { from: "rare",      outcomes: [{ to: "legendary", p: 0.98  }, { to: "immortal",  p: 0.02  }] },
      { from: "legendary", outcomes: [{ to: "immortal",  p: 0.99  }, { to: "arcana",    p: 0.001 }] },
      { from: "immortal",  outcomes: [{ to: "immortal",  p: 0.499, fail: true }, { to: "arcana",    p: 0.499 }, { to: "beyond",    p: 0.002 }] },
      { from: "arcana",    outcomes: [{ to: "arcana",    p: 0.669, fail: true }, { to: "beyond",    p: 0.329 }, { to: "celestial", p: 0.002 }] },
      { from: "beyond",    outcomes: [{ to: "beyond",    p: 0.7696, fail: true }, { to: "celestial", p: 0.2296 }, { to: "divine",    p: 0.0008 }] },
      { from: "celestial", outcomes: [{ to: "celestial", p: 0.8299, fail: true }, { to: "divine",    p: 0.1699 }, { to: "cosmic",    p: 0.0002 }] },
      { from: "divine",    outcomes: [{ to: "divine",    p: 0.909,  fail: true }, { to: "cosmic",    p: 0.091  }] }
    ];

    // ゴールに向けて必要な target の列
    const targets = ["uncommon", "rare", "legendary", "immortal", "arcana", "beyond", "celestial", "divine"];

    const rarityIndex  = new Map(rarities.map((r, i) => [r.key, i]));
    const rarityByKey  = new Map(rarities.map(r => [r.key, r]));
    const ruleByFrom   = new Map(rules.map(r => [r.from, r]));

    // ---- state ----
    const state = {
      inventory:    {},
      synthCount:   {},
      totalCommons: 0,
      failCount:    0,
      targetIndex:  0,
      logs:         []
    };
    for (const r of rarities) state.inventory[r.key]   = 0;
    for (const r of rules)    state.synthCount[r.from] = 0;

    // ---- DOM refs ----
    const stepBtn        = document.getElementById("stepBtn");
    const cancelBtn      = document.getElementById("cancelBtn");
    const resetBtn       = document.getElementById("resetBtn");
    const progressWrap   = document.getElementById("progressWrap");
    const progressTarget = document.getElementById("progressTarget");
    const progressPct    = document.getElementById("progressPct");
    const progressBar    = document.getElementById("progressBar");
    const progressSynths = document.getElementById("progressSynths");

    const modalOverlay  = document.getElementById("modalOverlay");
    const modalBox      = document.getElementById("modalBox");
    const modalIcon     = document.getElementById("modalIcon");
    const modalTitle    = document.getElementById("modalTitle");
    const modalBody     = document.getElementById("modalBody");
    const modalCloseBtn = document.getElementById("modalCloseBtn");
    const modalHint     = document.getElementById("modalHint");

    const MODAL_CLOSE_DELAY_MS = 700;
    let modalTimer = null;

    // ---- バッチ処理制御 ----
    // 1 tick あたりの最大「合成1回」数。
    // 再帰をなくしたので小さくしても安全。ブラウザに頻繁に制御を返す。
    const BATCH_SIZE   = 200;
    let   batchCancel  = false;
    let   batchRunning = false;

    function setBusy(running) {
      batchRunning = running;
      stepBtn.style.display   = running ? "none" : "";
      cancelBtn.style.display = running ? ""     : "none";
      resetBtn.disabled       = running;
      progressWrap.classList.toggle("active", running);
      if (!running) {
        progressBar.style.width = "0%";
      }
    }

    function updateProgress(label, current, total) {
      const pct = total > 0 ? Math.min(100, Math.round((current / total) * 100)) : 0;
      progressTarget.textContent  = label;
      progressPct.textContent     = `${pct}%`;
      progressBar.style.width     = `${pct}%`;
      progressSynths.textContent  =
        `合成 ${format(totalSynths())} 回 / コモン消費 ${format(state.totalCommons)} 個`;
    }

    // ---- モーダル ----
    function openMilestoneModal(title, body, options = {}) {
      const { icon = "✨", cosmic = false } = options;
      modalTitle.textContent = title;
      modalBody.textContent  = body;
      modalIcon.textContent  = icon;
      modalBox.classList.toggle("cosmic", cosmic);
      modalOverlay.hidden    = false;
      modalCloseBtn.disabled = true;
      modalHint.style.visibility = "visible";
      clearTimeout(modalTimer);
      modalTimer = setTimeout(() => {
        modalCloseBtn.disabled         = false;
        modalHint.style.visibility     = "hidden";
      }, MODAL_CLOSE_DELAY_MS);
    }

    function closeMilestoneModal() {
      clearTimeout(modalTimer);
      modalOverlay.hidden = true;
    }

    modalCloseBtn.addEventListener("click", closeMilestoneModal);
    document.addEventListener("keydown", e => {
      if (e.key === "Escape" && !modalOverlay.hidden && !modalCloseBtn.disabled) {
        closeMilestoneModal();
      }
    });

    // ---- ユーティリティ ----
    function format(v) {
      return Math.trunc(v).toLocaleString("ja-JP");
    }

    function compactJapanese(v) {
      const n    = Math.trunc(v);
      const oku  = Math.floor(n / 100000000);
      const man  = Math.floor((n % 100000000) / 10000);
      const rest = n % 10000;
      const parts = [];
      if (oku)  parts.push(`${oku}億`);
      if (man)  parts.push(`${man}万`);
      if (rest || parts.length === 0) parts.push(`${rest}`);
      return parts.join("");
    }

    function totalSynths() {
      return Object.values(state.synthCount).reduce((s, c) => s + c, 0);
    }

    function rarityName(key)  { return rarityByKey.get(key).name; }
    function rarityClass(key) { return rarityByKey.get(key).cls;  }
    function previousRarity(key) { return rarities[rarityIndex.get(key) - 1].key; }

    function rand() {
      if (window.crypto?.getRandomValues) {
        const buf = new Uint32Array(1);
        crypto.getRandomValues(buf);
        return (buf[0] + 0.5) / 4294967296;
      }
      return Math.random();
    }

    function chooseOutcome(rule) {
      const roll = rand();
      let total  = 0;
      for (const outcome of rule.outcomes) {
        total += outcome.p;
        if (roll < total) return outcome;
      }
      return rule.outcomes[rule.outcomes.length - 1];
    }

    // ---- コア合成ロジック（同期・1回ずつ） ----
    function addCommonsForOneCombine() {
      state.inventory.common += 9;
      state.totalCommons     += 9;
    }

    /**
     * fromKey の在庫を1つ合成する。
     * 戻り値: { from, to, failed } | null（在庫不足）
     */
    function synthesizeOne(fromKey) {
      if (state.inventory[fromKey] < 9) return null;
      const rule    = ruleByFrom.get(fromKey);
      const outcome = chooseOutcome(rule);
      state.inventory[fromKey] -= 9;
      state.inventory[outcome.to] += 1;
      state.synthCount[fromKey]   += 1;
      if (outcome.fail) state.failCount += 1;
      return { from: fromKey, to: outcome.to, failed: Boolean(outcome.fail) };
    }

    /**
     * 非再帰・フラットループで合成を1ステップ進める。
     *
     * 戦略: stopKey（目標）の直下レイヤーを優先し、
     *   足りない素材があれば一段下に降りる。
     *   スタックの代わりに「現在注目しているレイヤー」変数を使う。
     *
     * 戻り値: 実行した合成の結果 { from, to, failed } | null（停止条件に達した）
     */
    function stepOnce(stopKey, stopAt) {
      if (stopKey && state.inventory[stopKey] >= stopAt) return null;
      if (state.inventory.cosmic >= 1) return null;

      // stopKey の1個手前のレイヤーから始めて、素材が足りなければ下へ降りる
      const stopIdx  = rarityIndex.get(stopKey);
      // 合成の素材となるレイヤー（stopKey の1個下）
      let   curIdx   = stopIdx - 1;

      while (true) {
        if (state.inventory.cosmic >= 1) return null;
        if (stopKey && state.inventory[stopKey] >= stopAt) return null;

        const curKey = rarities[curIdx].key;

        if (state.inventory[curKey] >= 9) {
          // このレイヤーを合成できる
          return synthesizeOne(curKey);
        }

        // 素材が足りない → 一段下に降りる
        if (curIdx === 0) {
          // common → 補充
          addCommonsForOneCombine();
          // common が9個揃ったのでループ先頭に戻り合成
          continue;
        }

        curIdx--;
      }
    }

    // ---- バッチ処理: target を9個集める ----
    function gatherTargetBatch(target, commonsBefore, synthsBefore, onDone) {
      function tick() {
        if (batchCancel) {
          setBusy(false);
          render();
          addLog("warn", "キャンセル", "処理をキャンセルしました。");
          render();
          return;
        }

        // コズミック完成チェック（飛び級対応）
        if (state.inventory.cosmic >= 1) { onDone("cosmic"); return; }
        if (state.inventory[target] >= 9) { onDone("done"); return; }

        // BATCH_SIZE 回だけ stepOnce を呼ぶ
        for (let i = 0; i < BATCH_SIZE; i++) {
          if (batchCancel) break;
          if (state.inventory.cosmic >= 1) { onDone("cosmic"); return; }
          if (state.inventory[target] >= 9) { onDone("done"); return; }

          stepOnce(target, 9);
        }

        // 進捗表示してブラウザに制御を返す
        updateProgress(
          `${rarityName(target)}を集めています… (${format(state.inventory[target])} / 9)`,
          state.inventory[target],
          9
        );
        render();
        setTimeout(tick, 0);
      }

      setBusy(true);
      batchCancel = false;
      updateProgress(`${rarityName(target)}を集めています…`, 0, 9);
      setTimeout(tick, 0);
    }

    // ---- ログ ----
    function addLog(type, title, body) {
      state.logs.unshift({ type, title, body });
      state.logs = state.logs.slice(0, 70);
    }

    // ---- 次の目標カードのエフェクト ----
    const nextCard = document.querySelector(".next");
    let nextAnimTimer = null;

    function flashNext(type) {
      if (!nextCard) return;
      // 再生中でもリセットして即再発火できるようにクラスを一度除去
      nextCard.classList.remove("anim-success", "anim-fail");
      clearTimeout(nextAnimTimer);
      // reflow を強制して animation が最初から再生される
      void nextCard.offsetWidth;
      const cls = type === "fail" ? "anim-fail" : "anim-success";
      nextCard.classList.add(cls);
      // アニメーション終了後にクラスを除去
      const duration = type === "fail" ? 700 : 900;
      nextAnimTimer = setTimeout(() => nextCard.classList.remove(cls), duration);
    }

    // ---- ステップロジック ----
    function advanceStep() {
      if (batchRunning) return;

      // コズミック完成済み
      if (state.inventory.cosmic >= 1) {
        addLog("success", "完成済み", "コズミックが完成しました！リセットすると最初から遊べます。");
        render();
        return;
      }

      const target = targets[state.targetIndex];

      if (state.inventory[target] < 9) {
        // バッチで集める
        const commonsBefore = state.totalCommons;
        const synthsBefore  = totalSynths();
        const invBefore     = state.inventory[target];

        gatherTargetBatch(target, commonsBefore, synthsBefore, (result) => {
          setBusy(false);
          batchCancel = false;

          if (result === "cosmic") {
            // 飛び級でコズミック完成
            const title = "コズミック完成！（飛び級）";
            const body  = `処理途中でコズミックが完成しました！消費コモンは ${format(state.totalCommons)} 個です。`;
            addLog("success", title, body);
            render();
            openMilestoneModal(title, body, { icon: "🌌", cosmic: true });
            return;
          }

          // 通常: target が9個揃った
          const milestoneTitle = `${rarityName(target)}が9個揃った！`;
          const milestoneBody  =
            `${rarityName(target)} ${format(invBefore)}個 → ${format(state.inventory[target])}個。` +
            `消費コモン +${format(state.totalCommons - commonsBefore)} 個、` +
            `合成 +${format(totalSynths() - synthsBefore)} 回。`;
          addLog("success", milestoneTitle, milestoneBody);
          render();
          flashNext("success");
        });

      } else {
        // 9個揃っているので合成する
        combineTarget(target);
        render();
      }
    }

    function combineTarget(target) {
      const result = synthesizeOne(target);
      if (!result) return;

      // コズミック完成チェック（飛び級を含む）
      if (state.inventory.cosmic >= 1) {
        const title = result.to === "cosmic"
          ? "コズミック完成！"
          : "コズミック完成！（飛び級）";
        const body  =
          result.to === "cosmic"
            ? `${rarityName(result.from)}9個 → コズミック1個。消費コモンは ${format(state.totalCommons)} 個です。`
            : `${rarityName(result.from)}9個 → ${rarityName(result.to)}1個（飛び級）でコズミックが完成しました！消費コモンは ${format(state.totalCommons)} 個です。`;
        addLog("success", title, body);
        render();
        flashNext("success");
        openMilestoneModal(title, body, { icon: "🌌", cosmic: true });
        return;
      }

      if (result.failed) {
        addLog("fail", "合成失敗！",
          `${rarityName(result.from)}9個 → ${rarityName(result.to)}1個。もう一回同じ目標をやり直し。`);
        flashNext("fail");
        return;
      }

      addLog("success", "合成成功！",
        `${rarityName(result.from)}9個 → ${rarityName(result.to)}1個。次の段階へ進みます。`);
      state.targetIndex = Math.min(state.targetIndex + 1, targets.length - 1);
      flashNext("success");
    }

    // ---- next action テキスト ----
    function nextActionText() {
      if (state.inventory.cosmic >= 1) return "コズミック完成。リセットで最初から";
      const target = targets[state.targetIndex];
      return state.inventory[target] < 9
        ? `${rarityName(target)}を9個揃える！`
        : `${rarityName(target)}9個を合成する！`;
    }

    // ---- レンダリング ----
    function render() {
      document.getElementById("totalCommons").textContent    = `${format(state.totalCommons)} 個`;
      document.getElementById("totalCommonsSub").textContent =
        `コモン合成 ${format(state.synthCount.common)} 回 / 約 ${compactJapanese(state.totalCommons)} 個`;
      document.getElementById("nextAction").textContent  = nextActionText();
      document.getElementById("totalSynths").textContent = `${format(totalSynths())} 回`;
      document.getElementById("failCount").textContent   = `${format(state.failCount)} 回`;
      document.getElementById("stageName").textContent   =
        state.inventory.cosmic >= 1 ? "完成" : rarityName(targets[state.targetIndex]);

      const lastLog = state.logs[0];
      const message = document.getElementById("message");
      message.className   = `message ${lastLog ? lastLog.type : ""}`;
      message.textContent = lastLog
        ? `${lastLog.title}: ${lastLog.body}`
        : "ボタンを押すと、目標在庫まで合成します。";

      renderInventory();
      renderCounts();
      renderLog();
      renderCurrentProb();
    }

    function renderInventory() {
      const rows = rarities.map(r => `
        <tr>
          <td class="${r.cls}">${r.name}</td>
          <td>${format(state.inventory[r.key])} 個</td>
        </tr>`).join("");
      document.getElementById("inventory").innerHTML = `
        <table class="inventory">
          <thead><tr><th>レアリティ</th><th>在庫</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderCounts() {
      const rows = rules.map(r => `
        <tr>
          <td class="${rarityClass(r.from)}">${rarityName(r.from)}</td>
          <td>${format(state.synthCount[r.from])} 回</td>
        </tr>`).join("");
      document.getElementById("counts").innerHTML = `
        <table>
          <thead><tr><th>素材</th><th>合成回数</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderLog() {
      const items = state.logs.length
        ? state.logs.map(l =>
            `<div class="log-item ${l.type}"><b>${l.title}</b><br>${l.body}</div>`).join("")
        : `<div class="log-item"><b>ログ</b><br>まだ合成していません。</div>`;
      document.getElementById("log").innerHTML = items;
    }

    function renderProbRow(rule) {
      const segments = rule.outcomes.map(o => {
        const pct      = (o.p * 100).toFixed(3).replace(/\.?0+$/, "");
        const failCls  = o.fail ? " fail" : "";
        return `<span class="prob-seg${failCls}" style="width:${o.p * 100}%; background:${rarityByKey.get(o.to).color};" title="${rarityName(o.to)} ${pct}%"></span>`;
      }).join("");

      const legend = rule.outcomes.map(o => {
        const pct     = (o.p * 100).toFixed(3).replace(/\.?0+$/, "");
        const dotCls  = o.fail ? " fail" : "";
        return `<span>
          <span class="dot${dotCls}" style="background:${rarityByKey.get(o.to).color};"></span>
          <span class="${rarityClass(o.to)}">${rarityName(o.to)}</span>
          <span class="pct">${pct}%</span>
        </span>`;
      }).join("");

      return `
        <div class="prob-row">
          <div class="prob-row-head">
            <span class="name ${rarityClass(rule.from)}">${rarityName(rule.from)}9個を合成</span>
            <span class="sub">↓</span>
          </div>
          <div class="prob-bar">${segments}</div>
          <div class="prob-legend">${legend}</div>
        </div>`;
    }

    function renderRules() {
      document.getElementById("rules").innerHTML =
        `<div class="prob-list">${rules.map(renderProbRow).join("")}</div>`;
    }

    function currentSynthesisKey() {
      const target = targets[state.targetIndex];
      return state.inventory[target] < 9 ? previousRarity(target) : target;
    }

    function renderCurrentProb() {
      const rule = ruleByFrom.get(currentSynthesisKey());
      document.getElementById("currentProb").innerHTML = rule ? renderProbRow(rule) : "";
    }

    // ---- イベント ----
    stepBtn.addEventListener("click", advanceStep);

    cancelBtn.addEventListener("click", () => {
      batchCancel = true;
    });

    resetBtn.addEventListener("click", () => {
      if (batchRunning) {
        batchCancel = true;
        // tick() の次ループでキャンセル処理が走るのを待ってからリセット
        const waitAndReset = () => {
          if (batchRunning) { setTimeout(waitAndReset, 20); return; }
          doReset();
        };
        waitAndReset();
        return;
      }
      doReset();
    });

    function doReset() {
      batchCancel  = false;
      batchRunning = false;
      setBusy(false);
      for (const r of rarities) state.inventory[r.key]   = 0;
      for (const r of rules)    state.synthCount[r.from] = 0;
      state.totalCommons = 0;
      state.failCount    = 0;
      state.targetIndex  = 0;
      state.logs         = [];
      render();
    }

    // ---- 初期描画 ----
    renderRules();
    render();
  </script>
</body>
</html>
